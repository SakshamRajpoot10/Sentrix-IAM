databases:
  - name: sentrix-db
    plan: free

services:
  - type: redis
    name: sentrix-redis
    plan: free
    ipAllowList: []

  - type: web
    name: sentrix-ml-service
    env: docker
    dockerfilePath: ml/Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sentrix-db
          property: connectionString
      - key: ML_API_KEY
        value: sentrix-ml-internal-key
      - key: MODEL_DIR
        value: /app/ml/models/saved

  - type: web
    name: sentrix-backend-service
    env: docker
    dockerfilePath: backend/Dockerfile
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_HOST
        fromDatabase:
          name: sentrix-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: sentrix-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: sentrix-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: sentrix-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: sentrix-db
          property: password
      - key: REDIS_HOST
        fromService:
          name: sentrix-redis
          type: redis
          property: host
      - key: REDIS_PORT
        fromService:
          name: sentrix-redis
          type: redis
          property: port
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ML_SERVICE_URL
        fromService:
          name: sentrix-ml-service
          type: web
          property: host
      - key: ML_INTERNAL_API_KEY
        value: sentrix-ml-internal-key
      - key: ML_ENABLED
        value: "true"
