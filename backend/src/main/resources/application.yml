# ═══════════════════════════════════════════════════════════════
# SENTRIX — Main Application Configuration
# ═══════════════════════════════════════════════════════════════

spring:
  application:
    name: sentrix

  # ─── PostgreSQL ────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sentrix}
    username: ${DB_USER:sentrix}
    password: ${DB_PASSWORD:sentrix_dev}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
      pool-name: SentrixHikariPool

  # ─── JPA / Hibernate ──────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
        default_batch_fetch_size: 25

  # ─── Flyway Migrations ────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ─── Redis ─────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms

  # ─── Virtual Threads (Project Loom) ────────────────────────
  threads:
    virtual:
      enabled: true

  # ─── Jackson ───────────────────────────────────────────────
  jackson:
    serialization:
      write-dates-as-timestamps: false
      fail-on-empty-beans: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

  # ─── Mail (disabled by default — configure for prod) ───────
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# ─── JWT Configuration ──────────────────────────────────────
jwt:
  access-secret: ${JWT_ACCESS_SECRET:sentrix-dev-access-secret-key-must-be-at-least-256-bits-long-for-hs256}
  refresh-secret: ${JWT_REFRESH_SECRET:sentrix-dev-refresh-secret-key-must-be-at-least-256-bits-long-for-hs256}
  access-expiration: 900000       # 15 minutes in milliseconds
  refresh-expiration: 604800000   # 7 days in milliseconds

# ─── Razorpay Configuration ─────────────────────────────────
razorpay:
  key-id: ${RAZORPAY_KEY_ID:rzp_test_placeholder}
  key-secret: ${RAZORPAY_KEY_SECRET:placeholder_secret}
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:placeholder_webhook_secret}

# ─── ML Service Configuration ───────────────────────────────
ml:
  service-url: ${ML_SERVICE_URL:http://localhost:8000}
  api-key: ${ML_INTERNAL_API_KEY:sentrix-ml-internal-key}
  timeout: 5000
  enabled: ${ML_ENABLED:true}

# ─── Application Settings ───────────────────────────────────
app:
  cors-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
  rate-limit:
    auth: 5           # 5 requests per minute for auth endpoints
    general: 100       # 100 requests per 15 minutes for general
    agent: 1000        # 1000 requests per minute for agent authorization
  auto-revoke-threshold: 0.8
  bcrypt-rounds: 12
  hash-chain-genesis: "SENTRIX_GENESIS_HASH_v1"

# ─── Server Settings ────────────────────────────────────────
server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never
    include-exception: false
  servlet:
    context-path: /

# ─── Actuator ────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: false
  info:
    env:
      enabled: true

# ─── SpringDoc / Swagger ────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  show-actuator: false

# ─── Logging ─────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.sentrix: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
